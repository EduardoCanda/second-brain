site_name: Canda's Second Brain
site_description: Base de estudos em português sobre fundamentos de TI.
site_url: https://eduardocanda.github.io/second-brain/
repo_url: https://github.com/eduardocanda/second-brain
repo_name: second-brain

theme:
  font:
    text: Work Sans
  name: material
  palette:
  - media: '(prefers-color-scheme: light)'
    primary: teal
    scheme: default
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - media: '(prefers-color-scheme: dark)'
    primary: teal
    scheme: slate
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  language: pt-BR
  color_mode: dark
  user_color_mode_toggle: true

plugins:
  - search
  - awesome-pages
  - redirects

markdown_extensions:
  - admonition
  - toc:
      permalink: true

# Usa o próprio repositório como fonte do site.
docs_dir: docs

# Evita publicar pastas/arquivos internos no site.
exclude_docs: |
  .git/
  .github/
  .obsidian/
  site/
  venv/
  .venv/
  **.txt
