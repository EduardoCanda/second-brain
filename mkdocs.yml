      - 1 - Objetivo do dia e a aplicação: 06 - Semana DevOps (LinuxTips)/Dia 5/1 - Objetivo do dia e a aplicação.md
      - 2 - Dockerizando a aplicação: 06 - Semana DevOps (LinuxTips)/Dia 5/2 - Dockerizando a aplicação.md
      - 3 - Cluster EKS e Deploy no Kubernetes: 06 - Semana DevOps (LinuxTips)/Dia 5/3 - Cluster EKS e Deploy no Kubernetes.md
      - 4 - CI-CD Com Github Actions: 06 - Semana DevOps (LinuxTips)/Dia 5/4 - CI-CD Com Github Actions.md
      - 5 - Engenharia do Caos e Troubleshooting: 06 - Semana DevOps (LinuxTips)/Dia 5/5 - Engenharia do Caos e Troubleshooting.md

theme:
  features:
    - navigation.indexes
  font:
    text: Work Sans
  name: material
  palette:
  - media: '(prefers-color-scheme: light)'
    primary: blue
    scheme: default
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - media: '(prefers-color-scheme: dark)'
    primary: blue
    scheme: slate
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  language: pt-BR
  color_mode: dark
  user_color_mode_toggle: true

plugins:
  - search
  - awesome-pages
  - redirects
  - gh-admonitions

markdown_extensions:
  - admonition
  - toc:
      permalink: true

# Usa o próprio repositório como fonte do site.
docs_dir: docs

# Evita publicar pastas/arquivos internos no site.
exclude_docs: |
  .git/
  .github/
  .obsidian/
  site/
  venv/
  .venv/
  **.txt
