site_name: Second Brain do Canda
site_description: Base de estudos em português sobre fundamentos de TI.
site_url: https://eduardocanda.github.io/second-brain/
repo_url: https://github.com/eduardocanda/second-brain
repo_name: second-brain

theme:
  name: simple-blog
  language: pt-BR
  color_mode: dark
  user_color_mode_toggle: true

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true

# Usa o próprio repositório como fonte do site.
docs_dir: docs

# Evita publicar pastas/arquivos internos no site.
exclude_docs: |
  .git/
  .github/
  .obsidian/
  site/
  venv/
  .venv/
